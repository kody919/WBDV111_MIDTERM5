<!DOCTYPE html>
<html>
<head>
  <title>Login - ZitowFlow</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="navbar">
  <div class="logo">
    <img src="zitowflow.png" alt="logo">
    <span>ZitowFlow</span>
  </div>

  <div class="auth">
    <a href="login.html" class="btn ghost">Login</a>
    <a href="register.html" class="btn primary">Register</a>
  </div>
</header>

  <a href="index.html" class="btn">← Back</a>

<section style="padding:40px; max-width:400px; margin:auto;">
  <h1>Login</h1>
  <p style="color:#9ca3af;">Access your account</p>

  <form style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
    <input type="email" placeholder="Email" required>
    <input type="password" placeholder="Password" required>
    <button class="btn primary">Login</button>
  </form>
</section>

</body>
</html>
